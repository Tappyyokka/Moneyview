{% extends "base.html" %}
{% set hide_sidebar = True %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="text-center p-5 rounded-5 shadow-sm bg-white" style="max-width: 600px;">
        
        <div class="mb-4">
            <i class="bi bi-person-check-fill text-primary" style="font-size: 4rem;"></i>
        </div>
        
        <h1 class="fw-bold">Welcome back, {{ user_name }}!</h1>
        <p class="text-muted mb-4">You're logged in and ready to go. Track your progress or update your financial data via the dashboard.</p>
        
        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg px-5 rounded-pill shadow">
                Go to Dashboard
            </a>
            <a href="{{ url_for('onboarding', step_num=1) }}" class="btn btn-primary">
    Update Profile
</a>
            </a>
        </div>
        
    </div>
</div>
{% endblock %}
