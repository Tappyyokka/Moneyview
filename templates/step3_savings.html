{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="pro-card shadow-lg p-5" style="max-width: 650px; width: 100%; border-radius: 24px;">
        <div class="progress mb-4" style="height: 8px;">
            <div class="progress-bar bg-primary" style="width: 60%;"></div>
        </div>
        <div class="text-center mb-4">
            <h2 class="fw-bold">Step 3: Savings & Assets</h2>
            <p class="text-muted">What do you currently own?</p>
        </div>
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label fw-bold">Current Savings</label><input type="number" name="current_savings" class="form-control bg-light" placeholder="Bank balance" required></div>
                <div class="col-md-6"><label class="form-label fw-bold">Monthly Savings</label><input type="number" name="monthly_savings" class="form-control bg-light" placeholder="Target monthly" required></div>
                <div class="col-md-6"><label class="form-label fw-bold">Stocks/Investments</label><input type="number" name="stocks_investments" class="form-control bg-light" placeholder="Portfolio value" required></div>
                <div class="col-md-6"><label class="form-label fw-bold">Crypto Value</label><input type="number" name="crypto_value" class="form-control bg-light" placeholder="Digital assets" required></div>
                <div class="col-md-12"><label class="form-label fw-bold">Property Value</label><input type="number" name="property_value" class="form-control bg-light" placeholder="Real estate value" required></div>
            </div>
            <div class="mt-4 d-flex justify-content-between">
                <a href="javascript:history.back()" class="btn btn-light rounded-pill px-4">Back</a>
                <button type="submit" class="btn btn-primary rounded-pill px-5 fw-bold">Next <i class="bi bi-arrow-right"></i></button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
