{% extends "base.html" %}
{% set hide_sidebar = True %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow border-0 p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <h3 class="text-center fw-bold mb-4">Login to MoneyView</h3>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill">Login</button>
        </form>
        <div class="text-center mt-3">
            <small>Don't have an account? <a href="{{ url_for('register') }}">Register</a></small>
        </div>
    </div>
</div>
{% endblock %}
