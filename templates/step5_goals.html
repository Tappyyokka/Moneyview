{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="pro-card shadow-lg p-5" style="max-width: 650px; width: 100%; border-radius: 24px;">
        <div class="progress mb-4" style="height: 8px;">
            <div class="progress-bar bg-success" style="width: 100%;"></div>
        </div>
        <div class="text-center mb-4">
            <h2 class="fw-bold">Step 5: Final Goals</h2>
            <p class="text-muted">What are we working towards?</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Savings Goal ($)</label>
                <input type="number" name="savings_goal" class="form-control bg-light" placeholder="e.g. 50000" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Major Purchase Plan</label>
                <input type="text" name="major_purchase" class="form-control bg-light" placeholder="e.g. New Car, House Downpayment" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Financial Priority</label>
                <select name="priority" class="form-select bg-light">
                    <option value="Saving">Saving</option>
                    <option value="Investing">Investing</option>
                    <option value="Debt Payoff">Debt Payoff</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow">Finish & View Dashboard</button>
        </form>
    </div>
</div>
{% endblock %}
